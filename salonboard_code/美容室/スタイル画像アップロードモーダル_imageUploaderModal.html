<!--
  美容室 スタイル登録 (styleEdit) の「画像アップロード」モーダル 実DOM
  CN_CMN_imageUploaderModal.js が #imageUploaderModalBody に描画する。
  styleEdit の FRONT/SIDE/BACK 画像枠(img#FRONT_IMG_ID_IMG 等)をクリックで開く。

  ■ 自動投稿(postHairStyleViaForm / uploadHairStyleFrontImage)の確定フロー:
    1. FRONT 画像枠 (img#FRONT_IMG_ID_IMG) をクリック → このモーダルが開く。
    2. モーダル内の input[type=file] に setInputFiles (ドロップ領域 jscImageUploaderModalDropArea)。
    3. プレビュー img.jscImageUploaderModalThumbnail の src がセットされたらプレビュー完了。
    4. **登録ボタン = <input type="button" class="...jscImageUploaderModalSubmitButton" value="登録する">**
       ← <a> でも submit でもなく input[type=button]。これを1回だけクリックすると
         親フォームの #FRONT_IMG_ID (hidden) / #FRONT_IMG_ID_ID (span) に画像ID(B...)が入る。
       ★以前 a:has-text("登録する") / input[type=submit] で探していて押せず失敗していた(v0.2.112まで)。
    5. 完了判定: FRONT_IMG_ID hidden か #FRONT_IMG_ID_ID span に B... が入る。
       通信失敗時は #uploadError (class dn が外れてメッセージ表示)。
    ※連打すると再送して「通信に失敗しました」になるため1回だけ押す(v0.2.112)。
    ※新規スタイル(styleId="")では CautionText/CreateText(写真変更確認)は dn のまま=追加確認なし。
       既存写真の差し替え時のみ確認spanが出る。

  ■ CN_CMN_imageUploaderModal.js の実挙動 (JS解析で確定):
    - ファイル input = **input.jscImageUploaderModalInput** (.jscImageUploaderModalDropArea 内、非表示)。
      その 'change'(or drop) で prepareFileInfo() → グローバル waitImgeFile に File を保持 + プレビュー表示。
      uploadMode が true(モーダル表示中)のときだけ動く。#fileSizeLimit を超えると #uploadError 表示。
    - 「登録する」(input.jscImageUploaderModalSubmitButton) クリック → file_upload():
        FormData.append('formFile', waitImgeFile) ＋ setImgId/dataKey/targetActionId/TOKEN/STORE_ID 等
        を /imgreg/<URL_STR>doUpload?... へ $.ajax POST (timeout 35000ms)。
        成功で #imageUploaderModalBody に結果HTMLを append し、親フォームの FRONT_IMG_ID 等を更新。
    ★ハマりどころ: setInputFiles を **input.jscImageUploaderModalInput に**入れて change を
      発火させないと waitImgeFile が空のまま → formFile=空で POST → サーバが35sでタイムアウト
      →「通信に失敗しました」。generic な input[type=file] を狙うと別inputに入って失敗する(v0.2.113まで)。
      → v0.2.114 で input.jscImageUploaderModalInput を明示ターゲットに修正。

  ■ 2段AJAX (実JSで確定):
    1. FRONT画像クリック → onclick が img_upload_modal_view(setImgId, targetActionId, dataKey, ...) を呼ぶ。
       POST /imgreg/imgUpload/ (timeout 5s) → 返ってきたモーダルHTML(#imgUploadForm 入り)を
       #imageUploaderModalBody に append → viewModal → change ハンドラ等を attach。
    2. 「登録する」(jscImageUploaderModalSubmitButton) → file_upload():
       #imgUploadForm の hidden(setImgId/dataKey/targetActionId/TOKEN/STORE_ID/modified/pubManageId)
       ＋ FormData.append('formFile', **window.waitImgeFile**) を /imgreg/imgUpload/doUpload へ $.ajax(35s)。
       成功で res の #imageId 等を取り出し setUploadImage()→親フォーム FRONT_IMG_ID 更新→modalClose。
       userErrorFlg や「通信に失敗しました」をレスポンスで分岐。
    ★ waitImgeFile は **グローバル var**(=window.waitImgeFile)。prepareFileInfo(change/drop)で addWaitImgeFile(file)
      されないと空。空のまま doUpload すると 35s タイムアウト→「通信に失敗しました」(=ずっとローディング)。
    ★ 確実策(v0.2.116): モーダル input が attach されるまで待つ → input.jscImageUploaderModalInput に
      setInputFiles+change → window.waitImgeFile を検証(無ければ input.files[0]から addWaitImgeFile で補償) →
      **window.file_upload() を直接呼ぶ**(ボタンの click ハンドラと同等)。ボタン非活性/clickの取りこぼしを回避。

  ■ 主要セレクタ:
    見出し:   p.imageUploaderModalHeadingText (「画像アップロード」)
    ドロップ: div.jscImageUploaderModalDropArea (.imageUploaderModalDropArea)
    エラー:   #uploadError (dn のとき非表示)
    サムネ:   img.jscImageUploaderModalThumbnail (アップロード後 src セット)
    サムネ削除: a.jscImageUploaderModalThumbnailDeleteButton
    閉じる:   a.imageUploaderModalBottomCloseButton.jscImageUploaderModalCloseButton
    登録:     input[type=button].imageUploaderModalSubmitButton.jscImageUploaderModalSubmitButton (value="登録する")
-->
<div id="imageUploaderModalBody">
  <div class="imageUploaderModalFrameCenterInner">
    <div class="imageUploaderModalHeading">
      <p class="imageUploaderModalHeadingText">画像アップロード</p>
      <a href="javascript:void(0);" onclick="CNBopenWinContents('https://sbhd.salonboard.com/hc/ja/articles/360001644254');return false;">
        <img src="https://imgbp.salonboard.com/CNB/img/btn_help_01.png" class="rollover mr10" alt="ヘルプ">
      </a>
    </div>

    <p class="imageUploaderModalWarningText jscImageUploaderModalWarningText">
      <!-- 新規スタイルでは下記 span は class="dn"(非表示)。既存写真の差し替え時のみ表示。 -->
      <span class="CautionText dn"><em>！注意！ スタイル写真が変更されます！</em>…</span>
      <span class="imageUploaderModalNormalRedText dn">・ユーザが「ブックマーク」に登録している場合…</span>
      <span class="msgAnnotation isActive">※過去に、HOT PEPPER Beautyサイトの特集…</span>
      <span class="CreateText dn">新しくスタイルを作成するときは…このスタイルのFRONT写真を変更しますか？</span>
    </p>

    <div class="imageUploaderModalInner">
      <div class="imageUploaderModalDropArea jscImageUploaderModalDropArea isActive">
        <div id="uploadError" class="dn"></div>
        <div class="imageUploaderModalDropAreaIcon jscImageUploaderModalDropAreaIcon">
          <!-- ここに input[type=file] (クリック/ドロップで選択) -->
        </div>
        <div class="imageUploaderModalThumbnailArea jscImageUploaderModalThumbnailArea">
          <div class="imageUploaderModalThumbnailWrapper">
            <img class="imageUploaderModalThumbnail jscImageUploaderModalThumbnail" src="" alt=""><!-- 選択後 src がセット=プレビュー -->
            <a class="imageUploaderModalThumbnailDeleteButton jscImageUploaderModalThumbnailDeleteButton" href="#">削除</a>
          </div>
        </div>
      </div>
    </div>

    <p class="imageUploaderModalCopyrightText">※ 本サイト内で使用される画像に…</p>

    <div class="imageUploaderModalBottomButton">
      <a href="#" class="imageUploaderModalBottomCloseButton jscImageUploaderModalCloseButton">閉じる</a>
      <input type="button" class="imageUploaderModalSubmitButton jscImageUploaderModalSubmitButton" value="登録する">
    </div>
  </div>
</div>
