name: Release SalonBoard Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must match package.json, e.g. v0.2.200)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-macos-arm64:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate release version and select signing mode
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "v${package_version}" ]]; then
            echo "Release tag $RELEASE_TAG does not match package.json v${package_version}" >&2
            exit 1
          fi
          signing_ready=true
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              signing_ready=false
              echo "Signing secret is missing: $name"
            fi
          done
          if [[ "$signing_ready" == true ]]; then
            echo "BUILD_MODE=signed" >> "$GITHUB_ENV"
          else
            # ★署名なしフォールバック公開は廃止 (2026-07-20)。
            #   署名なしビルドを同一リリースへ公開すると、ローカルでアップロード済みの
            #   署名・公証済みアセットを上書きし、electron-updater の署名検証が必ず失敗する
            #   (「コードは指定されたコード要件を満たしていません」で全端末が更新不能。
            #    v0.2.207 / v0.2.208 で実際に発生)。署名シークレット未設定の間は
            #   CI リリースを失敗させ、ローカルの署名付きリリースを正とする。
            #   CI で署名するにはリポジトリ secrets に
            #   MACOS_CERTIFICATE_P12 / MACOS_CERTIFICATE_PASSWORD / APPLE_ID /
            #   APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID を設定すること。
            echo "Apple signing secrets are incomplete; refusing to publish an unsigned build (would break auto-update)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install bundled Playwright browsers
        run: npx playwright install chromium chromium-headless-shell

      - name: Type-check
        run: npm run type-check

      - name: Build, notarize, and publish GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BUILD_MODE" == "signed" ]]; then
            npm run publish:mac:arm64
          else
            npm run publish:mac:arm64:unsigned
          fi

      - name: Verify published release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft,assets,url \
            --jq '{isDraft, url, assets: [.assets[].name]}'
          asset_names="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          grep -q 'salonboard-sync-mac-arm64.dmg' <<< "$asset_names"
          grep -q 'salonboard-sync-mac-arm64.zip' <<< "$asset_names"
