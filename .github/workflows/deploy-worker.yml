name: Deploy SalonBoard Cloud Worker (EC2)

on:
  push:
    branches: [main]
    paths:
      - worker.ts
      - electron/scrapers.cjs
      - salonboard-selectors.ts
      - salonboard-rescan.ts
      - canary.ts
      - package.json
      - package-lock.json
      - .github/workflows/deploy-worker.yml
  workflow_dispatch:

concurrency:
  group: salonboard-cloud-worker-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  EC2_INSTANCE_ID: i-0f1cc0aff1ac8dd2e
  DEPLOY_BUCKET: kireidot-sb-worker-debug-972293797066
  CONTAINER_NAME: sb-worker-cloud
  REMOTE_WORKER_PATH: /opt/kireidot/worker.cjs

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      # EC2 container has Playwright in its runtime image. Keep it external so
      # Desktop and Cloud execute the exact same worker source from this commit.
      - name: Build Cloud worker bundle
        run: |
          npx esbuild worker.ts \
            --bundle --platform=node --format=cjs --target=node22 \
            --external:playwright --outfile=worker.cjs
          sha256sum worker.cjs

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload immutable bundle
        run: aws s3 cp worker.cjs "s3://$DEPLOY_BUCKET/deploy/$GITHUB_SHA/worker.cjs"

      - name: Deploy to EC2 through SSM
        shell: bash
        run: |
          set -euo pipefail
          URL=$(aws s3 presign "s3://$DEPLOY_BUCKET/deploy/$GITHUB_SHA/worker.cjs" --expires-in 900)
          PARAMS=$(jq -nc --arg url "$URL" --arg path "$REMOTE_WORKER_PATH" --arg container "$CONTAINER_NAME" --arg sha "$GITHUB_SHA" '{commands:[
            "set -e",
            ("curl -fL --retry 3 --connect-timeout 10 " + ($url|@sh) + " -o " + ($path + ".next"|@sh)),
            ("test -s " + ($path + ".next"|@sh)),
            ("mv " + ($path + ".next"|@sh) + " " + ($path|@sh)),
            ("docker restart " + ($container|@sh)),
            ("docker inspect " + ($container|@sh) + " " + ("--format=Status={{.State.Status}} Started={{.State.StartedAt}} RestartCount={{.RestartCount}}"|@sh)),
            ("echo deployed_commit=" + $sha)
          ]}')
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy-salonboard-worker-$GITHUB_SHA" \
            --parameters "$PARAMS" \
            --query Command.CommandId --output text)
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'

      - name: Deployment summary
        run: |
          echo "### SalonBoard Cloud Worker" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: \`$GITHUB_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- instance: \`$EC2_INSTANCE_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- container: \`$CONTAINER_NAME\`" >> "$GITHUB_STEP_SUMMARY"
