<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 340px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 14px;
        color: #222;
      }
      h3 { margin: 0 0 10px; font-size: 15px; }
      label { display: block; margin-top: 10px; font-size: 11px; color: #666; font-weight: 600; }
      input, button, select {
        width: 100%;
        margin-top: 4px;
        padding: 9px;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
      }
      button {
        margin-top: 14px;
        background: linear-gradient(135deg, #ff7eb3, #ff758c);
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      pre {
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 11px;
        background: #f6f6f6;
        padding: 8px;
        border-radius: 8px;
        margin-top: 12px;
        max-height: 240px;
        overflow: auto;
      }
      .hint { font-size: 11px; color: #999; margin-top: 4px; }
    </style>
  </head>
  <body>
    <h3>KireiDot 画像アップロード テスト</h3>

    <label>画像URL（公開URL）</label>
    <input id="imageUrl" placeholder="https://.../image.jpg" />
    <div class="hint">SalonBoard を開いているタブで実行します。</div>

    <label>対象</label>
    <select id="mode">
      <option value="hair-style-front">美容室スタイル FRONT（MVP）</option>
    </select>

    <button id="run">画像アップロード実行</button>

    <pre id="log"></pre>

    <script src="popup.js"></script>
  </body>
</html>
